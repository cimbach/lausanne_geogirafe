<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="GeoGirafe is an flexible application to build online geoportals." />

    <!--
      If redirect-url meta tag is present, a redirect will happen when the detected device is an iPhone or Android.
      The value of content should be a relative URL to the desired endpoint or page.
    -->
    <meta name="redirect-url" content="mobile.html" />
    <meta name="configs" content="main" />
    <link rel="config-main-url" href="config.json" />

    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="images/logo/apple-touch-icon-black.png"
      media="(prefers-color-scheme: light)" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="images/logo/apple-touch-icon-white.png"
      media="(prefers-color-scheme: dark)" />
    <link href="images/logo/favicon_black.svg" rel="icon" media="(prefers-color-scheme: light)" />
    <link href="images/logo/favicon_white.svg" rel="icon" media="(prefers-color-scheme: dark)" />
    <link rel="manifest" href="site.webmanifest" />

    <link rel="stylesheet" media="screen" href="styles/splash.css" />
    <link rel="stylesheet" href="styles/variables.css" />
    <link rel="stylesheet" href="styles/common.css" />
    <link rel="stylesheet" href="styles/index.css" />

    <link rel="preload" as="style" onload="this.onload=null;this.rel='stylesheet'" href="lib/tippy.js/tippy.css" />
    <link rel="preload" as="style" onload="this.onload=null;this.rel='stylesheet'" href="lib/tippy.js/backdrop.css" />
    <link rel="preload" as="style" onload="this.onload=null;this.rel='stylesheet'" href="lib/tippy.js/border.css" />
    <link rel="preload" as="style" onload="this.onload=null;this.rel='stylesheet'" href="lib/tippy.js/svg-arrow.css" />
    <noscript>
      <link rel="stylesheet" href="lib/tippy.js/tippy.css" />
      <link rel="stylesheet" href="lib/tippy.js/backdrop.css" />
      <link rel="stylesheet" href="lib/tippy.js/border.css" />
      <link rel="stylesheet" href="lib/tippy.js/svg-arrow.css" />
    </noscript>

    <script type="module" src="src/main.ts"></script>
    <title>GeoGirafe</title>
  </head>

  <body>
    <div id="splash-screen">
      <svg
        id="Logo_Geogirafe_vertical_black"
        data-name="Logo Geogirafe vertical black"
        xmlns="http://www.w3.org/2000/svg"

            d="M1294.3,200.45c-36.91-36.91-85.88-57.37-138.02-57.7-51.15-.32-100.63,19.32-137.55,54.73-39.37,37.76-61,88.88-60.72,143.3.27,52.29,21.45,102.52,58.68,139.24,37.09,36.59,86.16,56.73,138.32,56.73s97.44-18.67,133.96-52.58c.33-.31.65-.62.97-.93-10.54-6.14-20.35-13.01-29.43-20.59-27.83-23.21-48.8-53.08-62.56-89.27-15.65-41.19-20.21-85.41-22.76-127.09-1.13-18.49-28.23-18.47-40.6-13.58-17.01,6.72-34.22,30.3-39.66,46.96-36.24,111.04,35.41,173.1,130.05,204.66-21.4,10.38-45.44,16.15-70.85,16.01-88.62-.48-159.7-71.97-159.7-160.58,0-88.69,71.9-160.59,160.59-160.59,25.42,0,49.45,5.91,70.81,16.43l.19.32c10.2,10.92,13.38,26.34,14.57,45.88,4.51,74.06,14.84,146.98,84.62,186.12,2.57,1.44,5.84.41,7.13-2.24,12.89-26.6,19.68-56.19,19.68-85.91,0-52.62-20.49-102.09-57.7-139.3Z" />
        </g>
      </svg>
      <div class="loader"></div>
      <span lang="en">Loading...</span>
    </div>
    <girafe-app>
      <header>
        <girafe-theme-select data-tour="theme-selection"></girafe-theme-select>
        <img class="logo" alt="geogirafe-logo" src="images/logo/horizontal_black.svg" />
        <girafe-search id="search"></girafe-search>
        <girafe-oauth></girafe-oauth>
        <girafe-nav-history></girafe-nav-history>
        <girafe-video-record></girafe-video-record>
      </header>

      <girafe-help></girafe-help>
      <girafe-modals></girafe-modals>
      <girafe-default-context-menu></girafe-default-context-menu>
      <girafe-custom-context-menu></girafe-custom-context-menu>

      <div id="content">
        <div id="main">
          <girafe-lr-panel class="panel-left" dock="left">
            <girafe-tree-view slot="main"></girafe-tree-view>
          </girafe-lr-panel>
          <div id="content-map">
            <girafe-map></girafe-map>
            <div class="info-area">
              <girafe-basemap data-tour="basemap-selection"></girafe-basemap>
              <girafe-infobox></girafe-infobox>
            </div>
            <girafe-prototype-banner></girafe-prototype-banner>
            <footer>
              <girafe-scale></girafe-scale>
              <girafe-coordinate></girafe-coordinate>
              <span class="copyright">
                <span i18n="Information without public faith">Information without public faith</span>
                <span>
                  ©
                  <a href="https://doc.geomapfish.dev" target="_blank">GeoGirafe</a>,
                  <a href="https://www.swisstopo.admin.ch/en/legal-basis" target="_blank">swisstopo</a>,
                  <a href="http://www.openstreetmap.org/copyright" target="_blank">OSM</a>
                </span>
              </span>
            </footer>
          </div>
          <girafe-lr-panel class="panel-right" dock="right">
            <girafe-drawing slot="main"></girafe-drawing>
            <girafe-selection-tool slot="main"></girafe-selection-tool>
            <girafe-print slot="main"></girafe-print>
            <girafe-ext-layer slot="main"></girafe-ext-layer>
            <girafe-cross-section-settings slot="main"></girafe-cross-section-settings>
            <girafe-edit slot="main"></girafe-edit>
            <girafe-layout slot="main"></girafe-layout>
            <girafe-about slot="main"></girafe-about>
            <girafe-user-preferences slot="main"></girafe-user-preferences>
            <girafe-share slot="main"></girafe-share>
            <girafe-contact slot="main"></girafe-contact>
          </girafe-lr-panel>

          <girafe-info-window></girafe-info-window>
          <girafe-selection-window></girafe-selection-window>
        </div>
        <div id="content-bottom">
          <girafe-selection-grid dock="bottom"></girafe-selection-grid>
          <girafe-cross-section-view id="cross-section-footer" dock="bottom"></girafe-cross-section-view>
        </div>
      </div>

      <div id="buttonbar">
        <button
          tip="drawing-panel"
          slot="menu-content"
          class="gg-icon-button gg-big"
          onclick="document.geogirafe.state.interface.drawingPanelVisible = !document.geogirafe.state.interface.drawingPanelVisible">
          <img alt="draw-icon" src="icons/draw.svg" />
        </button>
        <button
          tip="selection-tool-panel"
          slot="menu-content"
          class="gg-icon-button gg-big"
          onclick="document.geogirafe.state.interface.selectionToolPanelVisible = !document.geogirafe.state.interface.selectionToolPanelVisible">
          <img alt="draw-icon" src="icons/select.svg" />
        </button>
        <button
          tip="external-entry"
          slot="menu-content"
          class="gg-icon-button gg-big"
          onclick="document.geogirafe.state.interface.extLayerPanelVisible = !document.geogirafe.state.interface.extLayerPanelVisible">
          <img alt="ext-icon" src="icons/external-entry.svg" />
        </button>
        <button
          tip="print-panel"
          slot="menu-content"
          class="gg-icon-button gg-big"
          plugin="config:print"
          onclick="document.geogirafe.state.interface.printPanelVisible = !document.geogirafe.state.interface.printPanelVisible">
          <img alt="print-icon" src="icons/print.svg" />
        </button>
        <button
          tip="lidar-panel"
          slot="menu-content"
          class="gg-icon-button gg-big"
          plugin="config:lidar"
          onclick="document.geogirafe.state.interface.crossSectionPanelVisible = !document.geogirafe.state.interface.crossSectionPanelVisible">
          <img alt="cross-section-icon" src="icons/cross-section.svg" />
        </button>
        <button
          tip="edit-panel"
          slot="menu-content"
          class="gg-icon-button gg-big"
          onclick="document.geogirafe.state.interface.editPanelVisible = !document.geogirafe.state.interface.editPanelVisible">
          <img alt="edit-icon" src="icons/edit.svg" />
        </button>
        <button
          tip="share-panel"
          slot="menu-content"
          class="gg-icon-button gg-big"
          plugin="config:share"
          onclick="document.geogirafe.state.interface.sharePanelVisible = !document.geogirafe.state.interface.sharePanelVisible">
          <img alt="share-icon" src="icons/share.svg" />
        </button>
        <button
          tip="layout-panel"
          class="gg-icon-button gg-big"
          plugin="config:map3d"
          onclick="document.geogirafe.state.interface.layoutPanelVisible = !document.geogirafe.state.interface.layoutPanelVisible">
          <img alt="layout-icon" src="icons/layout.svg" />
        </button>
        <button
          tip="contact-panel"
          class="gg-icon-button gg-big"
          plugin="config:contact"
          onclick="document.geogirafe.state.interface.contactPanelVisible = !document.geogirafe.state.interface.contactPanelVisible">
          <img alt="layout-icon" src="icons/mail.svg" />
        </button>
        <button tip="infra3d" class="gg-icon-button gg-big" plugin="plugin_infra3d" onclick="alert('infra3d')">
          <img alt="help-icon" src="icons/infra3d.svg" />
        </button>

        <div class="filler"></div>

        <button
          tip="help"
          class="gg-icon-button gg-big"
          onclick="document.geogirafe.state.interface.helpVisible = true">
          <img alt="help-icon" src="icons/help.svg" />
        </button>
        <button
          tip="about-panel"
          class="gg-icon-button gg-big"
          onclick="document.geogirafe.state.interface.aboutPanelVisible = !document.geogirafe.state.interface.aboutPanelVisible">
          <img alt="info-icon" src="icons/info.svg" />
        </button>
        <button
          tip="user-preferences-panel"
          class="gg-icon-button gg-big"
          onclick="document.geogirafe.state.interface.userPreferencesPanelVisible = !document.geogirafe.state.interface.userPreferencesPanelVisible">
          <img alt="user-preferences-icon" src="icons/config.svg" />
        </button>
      </div>
    </girafe-app>
  </body>
</html>
